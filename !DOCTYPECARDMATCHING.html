<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pink Card Matching Game</title>
<style>
  body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background-color: #ffe6f0;
    text-align: center;
  }

  h1 {
    color: #ff3399;
    margin-top: 20px;
  }

  #gameArea {
    display: grid;
    grid-template-columns: repeat(4, 100px);
    grid-gap: 15px;
    justify-content: center;
    margin: 20px auto;
  }

  .card {
    width: 100px;
    height: 150px;
    background-color: #ffb3d9;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    perspective: 1000px;
  }

  .card-inner {
    position: absolute;
    width: 100%;
    height: 100%;
    transition: transform 0.6s;
    transform-style: preserve-3d;
    border-radius: 10px;
  }

  .card.flipped .card-inner {
    transform: rotateY(180deg);
  }

  .card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 10px;
    backface-visibility: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 40px;
    font-weight: bold;
    color: white;
  }

  .card-front {
    background-color: #ff3399;
    transform: rotateY(180deg);
  }

  .card-back {
    background-color: #ffb3d9;
  }

  #moves {
    margin-top: 10px;
    font-size: 20px;
    color: #ff3399;
  }

  #message {
    margin-top: 10px;
    font-size: 22px;
    color: #ff3399;
  }
</style>
</head>
<body>

<h1>Pink Card Matching Game</h1>
<div id="gameArea"></div>
<div id="moves">Moves: 0</div>
<div id="message"></div>

<script>
const gameArea = document.getElementById('gameArea');
const movesDisplay = document.getElementById('moves');
const messageDisplay = document.getElementById('message');

let moves = 0;
let flippedCards = [];
let matchedPairs = 0;

// Simple card symbols (8 pairs for 4x4 grid)
const symbols = ['🍓','🍑','🍒','🍬','🍩','🍧','🍪','🍉'];
let cards = [...symbols, ...symbols]; // duplicate for pairs

// Shuffle function
function shuffle(array) {
  for (let i = array.length -1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

// Create card elements
function createCards() {
  shuffle(cards);
  gameArea.innerHTML = '';
  cards.forEach(symbol => {
    const card = document.createElement('div');
    card.classList.add('card');
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-front">${symbol}</div>
        <div class="card-back"></div>
      </div>
    `;
    gameArea.appendChild(card);
  });

  // Show all cards briefly
  const allCards = document.querySelectorAll('.card');
  allCards.forEach(card => card.classList.add('flipped'));

  // After 3 seconds, hide all cards to start the game
  setTimeout(() => {
    allCards.forEach(card => card.classList.remove('flipped'));
    // Add click event listeners
    allCards.forEach(card => card.addEventListener('click', () => flipCard(card)));
  }, 3000);
}

function flipCard(card) {
  if (flippedCards.length < 2 && !card.classList.contains('flipped')) {
    card.classList.add('flipped');
    flippedCards.push(card);

    if (flippedCards.length === 2) {
      moves++;
      movesDisplay.textContent = 'Moves: ' + moves;
      checkMatch();
    }
  }
}

function checkMatch() {
  const [card1, card2] = flippedCards;
  const symbol1 = card1.querySelector('.card-front').textContent;
  const symbol2 = card2.querySelector('.card-front').textContent;

  if (symbol1 === symbol2) {
    matchedPairs++;
    flippedCards = [];
    if (matchedPairs === symbols.length) {
      messageDisplay.textContent = '🎉 You Won! 🎉';
    }
  } else {
    setTimeout(() => {
      card1.classList.remove('flipped');
      card2.classList.remove('flipped');
      flippedCards = [];
    }, 1000);
  }
}

// Initialize game
createCards();
</script>

</body>
</html>
