<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess vs AI</title>

<style>
  body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: #0f172a;
    color: #e5e7eb;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .app {
    display: grid;
    grid-template-columns: auto 260px;
    gap: 20px;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(8, 70px);
    border: 4px solid #020617;
  }

  .square {
    width: 70px;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.3rem;
    cursor: pointer;
    user-select: none;
  }

  .light { background: #f1f5f9; color: #020617; }
  .dark  { background: #F52773; color: #020617; }

  .selected { outline: 3px solid #22c55e; }
  .legal { background: #38bdf8 !important; }

  .panel {
    background: #020617;
    padding: 12px;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
  }

  .status {
    font-weight: bold;
    margin-bottom: 8px;
  }

  .moves {
    flex: 1;
    overflow-y: auto;
    border: 1px solid #334155;
    padding: 6px;
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<div class="app">
  <div class="board" id="board"></div>

  <div class="panel">
    <div class="status" id="status">White to move</div>
    <div class="moves" id="moves"></div>
  </div>
</div>

<script>
/* ============================
   GAME STATE
============================ */

const boardEl = document.getElementById("board");
const statusEl = document.getElementById("status");
const movesEl = document.getElementById("moves");

let turn = "w";
let selected = null;
let moveList = [];

const symbols = {
  r:"♜", n:"♞", b:"♝", q:"♛", k:"♚", p:"♟",
  R:"♖", N:"♘", B:"♗", Q:"♕", K:"♔", P:"♙"
};

let board = [
  "rnbqkbnr",
  "pppppppp",
  "........",
  "........",
  "........",
  "........",
  "PPPPPPPP",
  "RNBQKBNR"
].map(r => r.split(""));

/* ============================
   RENDERING
============================ */

function drawBoard(highlights = []) {
  boardEl.innerHTML = "";
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const sq = document.createElement("div");
      sq.className = `square ${(r + c) % 2 ? "dark" : "light"}`;
      sq.dataset.r = r;
      sq.dataset.c = c;
      if (board[r][c] !== ".") sq.textContent = symbols[board[r][c]];
      if (selected && selected[0] === r && selected[1] === c)
        sq.classList.add("selected");
      if (highlights.some(m => m[0] === r && m[1] === c))
        sq.classList.add("legal");
      sq.onclick = () => onClick(r, c);
      boardEl.appendChild(sq);
    }
  }
}

/* ============================
   USER INTERACTION
============================ */

function onClick(r, c) {
  if (turn !== "w") return;

  if (selected) {
    if (isLegalMove(selected[0], selected[1], r, c)) {
      makeMove(selected[0], selected[1], r, c);
      selected = null;
      drawBoard();
      setTimeout(aiMove, 400);
      return;
    }
    selected = null;
  }

  if (board[r][c] !== "." && board[r][c] === board[r][c].toUpperCase()) {
    selected = [r, c];
    drawBoard(getLegalMoves(r, c));
  }
}

/* ============================
   MOVE HANDLING
============================ */

function makeMove(fr, fc, tr, tc) {
  const piece = board[fr][fc];
  board[tr][tc] = piece;
  board[fr][fc] = ".";
  logMove(piece, fr, fc, tr, tc);
  turn = turn === "w" ? "b" : "w";
  statusEl.textContent = turn === "w" ? "White to move" : "Black thinking…";
}

function logMove(piece, fr, fc, tr, tc) {
  const files = "abcdefgh";
  const notation = files[fc] + (8 - fr) + "-" + files[tc] + (8 - tr);
  const div = document.createElement("div");
  div.textContent = (piece === piece.toUpperCase() ? "White: " : "Black: ") + notation;
  movesEl.appendChild(div);
  movesEl.scrollTop = movesEl.scrollHeight;
}

/* ============================
   MOVE GENERATION
============================ */

function isLegalMove(fr, fc, tr, tc) {
  return getLegalMoves(fr, fc).some(m => m[0] === tr && m[1] === tc);
}

function getLegalMoves(r, c) {
  const piece = board[r][c];
  const moves = [];
  const color = piece === piece.toUpperCase();
  const dir = color ? -1 : 1;

  const add = (rr, cc) => {
    if (rr < 0 || rr > 7 || cc < 0 || cc > 7) return;
    const t = board[rr][cc];
    if (t === "." || (t === t.toUpperCase()) !== color)
      moves.push([rr, cc]);
  };

  switch (piece.toLowerCase()) {
    case "p":
      if (board[r + dir]?.[c] === ".") add(r + dir, c);
      [[dir, -1], [dir, 1]].forEach(d => {
        const t = board[r + d[0]]?.[c + d[1]];
        if (t && t !== "." && (t === t.toUpperCase()) !== color)
          add(r + d[0], c + d[1]);
      });
      break;

    case "r":
    case "b":
    case "q":
      const dirs = [];
      if (piece.toLowerCase() !== "b") dirs.push([1,0],[-1,0],[0,1],[0,-1]);
      if (piece.toLowerCase() !== "r") dirs.push([1,1],[1,-1],[-1,1],[-1,-1]);
      dirs.forEach(d => {
        for (let i = 1; i < 8; i++) {
          const rr = r + d[0]*i, cc = c + d[1]*i;
          if (rr<0||rr>7||cc<0||cc>7) break;
          if (board[rr][cc] === ".") add(rr,cc);
          else { add(rr,cc); break; }
        }
      });
      break;

    case "n":
      [[2,1],[2,-1],[-2,1],[-2,-1],[1,2],[1,-2],[-1,2],[-1,-2]]
        .forEach(d => add(r+d[0], c+d[1]));
      break;

    case "k":
      for (let dr=-1;dr<=1;dr++)
        for (let dc=-1;dc<=1;dc++)
          if (dr||dc) add(r+dr, c+dc);
  }
  return moves;
}

/* ============================
   AI (MINIMAX)
============================ */

function aiMove() {
  let best = null;
  let bestScore = -Infinity;

  for (let r=0;r<8;r++) for (let c=0;c<8;c++) {
    if (board[r][c] === board[r][c].toLowerCase()) {
      for (const m of getLegalMoves(r,c)) {
        const copy = JSON.parse(JSON.stringify(board));
        board[m[0]][m[1]] = board[r][c];
        board[r][c] = ".";
        const score = evaluate();
        board = copy;
        if (score > bestScore) {
          bestScore = score;
          best = [r,c,m[0],m[1]];
        }
      }
    }
  }

  if (best) {
    makeMove(...best);
    drawBoard();
  }
}

/* ============================
   BOARD EVALUATION
============================ */

function evaluate() {
  const values = {p:1,n:3,b:3,r:5,q:9,k:100};
  let score = 0;
  for (const row of board)
    for (const p of row)
      if (p !== ".")
        score += p === p.toLowerCase()
          ? values[p]
          : -values[p.toLowerCase()];
  return score;
}

/* ============================
   START GAME
============================ */

drawBoard();
</script>
</body>
</html>
