<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic-Tac-Toe</title>

  <!-- =======================
       CSS (Modern & Responsive)
       ======================= -->
  <style>
    :root {
      --bg: #FF69B4;
      --panel: #111827;
      --cell: #1f2937;
      --accent: #22c55e;
      --accent2: #3b82f6;
      --danger: #ef4444;
      --text: #e5e7eb;
    }

    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .game {
      background: var(--panel);
      padding: 1.5rem;
      border-radius: 12px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      text-align: center;
    }

    h1 {
      margin: 0 0 0.5rem;
    }

    .controls {
      margin: 0.75rem 0;
    }

    select, button {
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      border: none;
      font-size: 0.95rem;
    }

    select {
      margin-right: 0.5rem;
      background: var(--cell);
      color: var(--text);
    }

    button {
      background: var(--accent2);
      color: #fff;
      cursor: pointer;
      transition: transform 0.1s ease, background 0.2s ease;
    }

    button:hover {
      background: #2563eb;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .status {
      margin: 0.75rem 0;
      min-height: 1.2em;
      font-weight: 500;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      margin: 1rem 0;
    }

    .cell {
      background: var(--cell);
      aspect-ratio: 1 / 1;
      border-radius: 10px;
      font-size: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
      user-select: none;
    }

    .cell:hover {
      background: #374151;
      transform: scale(1.03);
    }

    .cell.taken {
      cursor: not-allowed;
    }

    .cell.win {
      background: var(--accent);
      color: #022c22;
    }

    .restart {
      margin-top: 0.5rem;
      background: var(--danger);
    }

    .restart:hover {
      background: #dc2626;
    }
  </style>
</head>
<body>

  <!-- =======================
       HTML STRUCTURE
       ======================= -->
  <div class="game">
    <h1>Tic-Tac-Toe</h1>

    <div class="controls">
      <select id="mode">
        <option value="pvp">Player vs Player</option>
        <option value="ai">Player vs Computer</option>
      </select>
      <button id="restartBtn">Restart</button>
    </div>

    <div class="status" id="status">Player X's turn</div>

    <div class="board" id="board">
      <!-- 9 cells generated by JS -->
    </div>
  </div>

  <!-- =======================
       JAVASCRIPT (Game Logic)
       ======================= -->
  <script>
    /*
      Game State Variables
    */
    const boardEl = document.getElementById("board");
    const statusEl = document.getElementById("status");
    const restartBtn = document.getElementById("restartBtn");
    const modeSelect = document.getElementById("mode");

    let board = Array(9).fill("");
    let currentPlayer = "X";
    let gameActive = true;
    let gameMode = "pvp"; // or "ai"

    const HUMAN = "X";
    const AI = "O";

    const winPatterns = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    /*
      Initialize Board
    */
    function initBoard() {
      boardEl.innerHTML = "";
      board = Array(9).fill("");
      currentPlayer = "X";
      gameActive = true;
      statusEl.textContent = "Player X's turn";

      for (let i = 0; i < 9; i++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.dataset.index = i;
        cell.addEventListener("click", handleCellClick);
        boardEl.appendChild(cell);
      }
    }

    /*
      Handle Cell Clicks
      Prevents invalid moves and ignores clicks after game over
    */
    function handleCellClick(e) {
      const index = e.target.dataset.index;

      if (!gameActive || board[index] !== "") return;

      makeMove(index, currentPlayer);

      const result = checkGameResult();
      if (result) return;

      switchTurn();

      // AI move if enabled
      if (gameMode === "ai" && currentPlayer === AI) {
        setTimeout(() => {
          const bestMove = minimax(board, AI).index;
          makeMove(bestMove, AI);
          checkGameResult();
          switchTurn();
        }, 300);
      }
    }

    /*
      Place a move on the board
    */
    function makeMove(index, player) {
      board[index] = player;
      const cell = boardEl.children[index];
      cell.textContent = player;
      cell.classList.add("taken");
    }

    /*
      Switch active player and update status
    */
    function switchTurn() {
      if (!gameActive) return;
      currentPlayer = currentPlayer === "X" ? "O" : "X";
      statusEl.textContent = `Player ${currentPlayer}'s turn`;
    }

    /*
      Check for win or draw
      Highlights winning cells
    */
    function checkGameResult() {
      for (const pattern of winPatterns) {
        const [a,b,c] = pattern;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          gameActive = false;
          statusEl.textContent = `Player ${board[a]} wins!`;
          pattern.forEach(i => boardEl.children[i].classList.add("win"));
          return true;
        }
      }

      if (!board.includes("")) {
        gameActive = false;
        statusEl.textContent = "It's a draw!";
        return true;
      }
      return false;
    }

    /*
      Minimax Algorithm (Unbeatable AI)
      AI is maximizing, Human is minimizing
    */
    function minimax(newBoard, player) {
      const empty = newBoard
        .map((v,i) => v === "" ? i : null)
        .filter(v => v !== null);

      if (checkStaticWin(newBoard, HUMAN)) return { score: -10 };
      if (checkStaticWin(newBoard, AI)) return { score: 10 };
      if (empty.length === 0) return { score: 0 };

      const moves = [];

      for (let i of empty) {
        const move = { index: i };
        newBoard[i] = player;

        const result = minimax(
          newBoard,
          player === AI ? HUMAN : AI
        );
        move.score = result.score;

        newBoard[i] = "";
        moves.push(move);
      }

      return player === AI
        ? moves.reduce((a,b) => b.score > a.score ? b : a)
        : moves.reduce((a,b) => b.score < a.score ? b : a);
    }

    /*
      Static win check for minimax
    */
    function checkStaticWin(b, p) {
      return winPatterns.some(pattern =>
        pattern.every(i => b[i] === p)
      );
    }

    /*
      Event Listeners
    */
    restartBtn.addEventListener("click", initBoard);

    modeSelect.addEventListener("change", () => {
      gameMode = modeSelect.value;
      initBoard();
    });

    /*
      Start Game
    */
    initBoard();
  </script>
</body>
</html>
