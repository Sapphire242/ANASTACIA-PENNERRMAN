<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🌸My To Do App🌸</title>

<style>
* {
    margin: 0;
    padding: 0;
    font-family: "Poppins", sans-serif;
    box-sizing: border-box;
}

body {
    background: #ffb6c1;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.container {
    background: #ffff00;
    padding: 20px;
    border-radius: 10px;
    width: 320px;
}

.center-text {
    text-align: center;
}

.todo-header h2 {
    color: white;
    margin-bottom: 15px;
}

.todo-body {
    display: flex;
    gap: 8px;
    margin-bottom: 15px;
}

.todo-input {
    flex: 1;
    padding: 8px;
    border-radius: 5px;
    border: none;
    outline: none;
}

.add-btn {
    background: white;
    border: none;
    padding: 8px 12px;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
}

ul {
    list-style: none;
}

li {
    background: #fff;
    padding: 8px;
    border-radius: 5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    cursor: pointer;
    animation: fadeIn 0.3s ease-in-out;
    transition: all 0.3s ease;
}

li.completed {
    text-decoration: line-through;
    opacity: 0.6;
}

li.removing {
    opacity: 0;
    transform: translateX(40px);
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.edit-btn,
.delete-btn {
    background: none;
    border: none;
    font-size: 16px;
    cursor: pointer;
}

.edit-btn {
    color: #00bfff;
    margin-right: 6px;
}

.delete-btn {
    color: #ff1493;
}
</style>
</head>

<body>

<div class="container">
    <div class="todo-header center-text">
        <h2>🌸To Do List🌸</h2>
    </div>

    <div class="todo-body">
        <input
            type="text"
            id="todolist"
            class="todo-input"
            placeholder="Add your task"
        />
        <button class="add-btn" onclick="addTask()">+</button>
    </div>

    <ul id="task-list"></ul>
</div>

<script>
const input = document.getElementById("todolist");
const taskList = document.getElementById("task-list");

// Load saved tasks
taskList.innerHTML = localStorage.getItem("tasks") || "";

// Add task
function addTask() {
    if (input.value.trim() === "") return;

    const li = document.createElement("li");
    li.innerHTML = `
        <span>${input.value}</span>
        <div>
            <button class="edit-btn">✏</button>
            <button class="delete-btn">✖</button>
        </div>
    `;

    taskList.appendChild(li);
    input.value = "";
    saveTasks();
}

// Event delegation
taskList.addEventListener("click", function (e) {

    const li = e.target.closest("li");
    if (!li) return;

    // Delete
    if (e.target.classList.contains("delete-btn")) {
        li.classList.add("removing");
        setTimeout(() => {
            li.remove();
            saveTasks();
        }, 300);
    }

    // Edit
    if (e.target.classList.contains("edit-btn")) {
        const span = li.querySelector("span");
        const newText = prompt("Edit your task:", span.textContent);

        if (newText !== null && newText.trim() !== "") {
            span.textContent = newText;
            saveTasks();
        }
    }

    // Toggle complete
    if (e.target.tagName === "SPAN") {
        li.classList.toggle("completed");
        saveTasks();
    }
});

// Save tasks
function saveTasks() {
    localStorage.setItem("tasks", taskList.innerHTML);
}

// Press Enter to add task
input.addEventListener("keypress", function (e) {
    if (e.key === "Enter") {
        addTask();
    }
});
</script>

</body>
</html>
